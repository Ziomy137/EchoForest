name: Export & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── NUnit tests + coverage ──────────────────────────────────────────────────
  test:
    name: NUnit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore EchoForest.sln

      - name: Build tests
        run: dotnet build src/Scripts/Tests/EchoForest.Tests.csproj --configuration Release --no-restore

      - name: Run tests with coverage
        run: |
          dotnet test src/Scripts/Tests/EchoForest.Tests.csproj \
            --no-build --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults/**/coverage.cobertura.xml

  # ── Godot export (all 3 platforms) ─────────────────────────────────────────
  export:
    name: Export (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            preset: "Windows Desktop"
            artifact: export/windows/EchoForest.exe
          - platform: linux
            preset: "Linux/X11"
            artifact: export/linux/EchoForest.x86_64
          - platform: macos
            preset: macOS
            artifact: export/macos/EchoForest.zip

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Export ${{ matrix.platform }}
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_export_templates.tpz
          relative_project_path: ./
          export_debug: false
          cache: true
          use_preset_export_path: true

      - name: Smoke test — artefact exists
        run: bash scripts/build-test.sh ${{ matrix.platform }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: EchoForest-${{ matrix.platform }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
