name: Export

on:
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.2"

jobs:
  # ── Godot export (all 3 platforms) ─────────────────────────────────────────
  # Triggered manually via workflow_dispatch.
  export:
    name: Export (${{ matrix.platform }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            export_preset: "Windows Desktop"
            sanitized_preset: "Windows Desktop"
          - platform: linux
            export_preset: "Linux/X11"
            sanitized_preset: "LinuxX11"
          - platform: macos
            export_preset: "macOS"
            sanitized_preset: "macOS"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Export ${{ matrix.platform }}
        id: godot-export
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_mono_linux_x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_mono_export_templates.tpz
          relative_project_path: ./
          export_debug: false
          cache: true
          presets_to_export: ${{ matrix.export_preset }}

      - name: Move exports to output directory
        run: |
          mkdir -p export/${{ matrix.platform }}
          cp -r "${{ steps.godot-export.outputs.build_directory }}/${{ matrix.sanitized_preset }}/." export/${{ matrix.platform }}/

      - name: Smoke test — artefact exists
        run: bash scripts/build-test.sh ${{ matrix.platform }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: EchoForest-${{ matrix.platform }}
          path: export/${{ matrix.platform }}/
          if-no-files-found: error
